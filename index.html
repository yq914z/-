<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>夜曲预测系统</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
    background: linear-gradient(135deg,#0a0a1a,#1a1a3e);
    color:#fff;
    padding:15px;
}
.container {
    max-width:600px;
    margin:auto;
    background:#16213e;
    padding:20px;
    border-radius:15px;
}
h1 {
    text-align:center;
    color:#ffdd00;
    font-size:22px;
}
.note {
    text-align:center;
    color:#00ffff;
    margin-bottom:20px;
    font-weight:bold;
}
button {
    width:100%;
    padding:15px;
    font-size:18px;
    background:#07c160;
    border:none;
    border-radius:10px;
    color:#fff;
    cursor:pointer;
}
.log {
    margin-top:15px;
    background:#0a0a1a;
    padding:12px;
    border-radius:8px;
    font-size:13px;
    max-height:220px;
    overflow-y:auto;
    white-space:pre-wrap;
}
.result {
    margin-top:15px;
    background:#0f3460;
    padding:15px;
    border-radius:10px;
    display:none;
}
.tag {
    display:inline-block;
    padding:4px 10px;
    border-radius:6px;
    font-size:14px;
}
.kill { background:#e64340; }
.suggest { background:#1989fa; }
</style>
</head>

<body>
<div class="container">
    <h1>🌙 夜曲独家预测</h1>
    <p class="note">旺旺号：856322512</p>

    <button onclick="loadData()">🔄 自动读取 G28.cc 数据</button>

    <div id="log" class="log">点击按钮开始...\n</div>

    <div id="result" class="result">
        🔴 杀组：<span id="kill" class="tag kill">-</span><br><br>
        🟢 建议组合：<span id="suggest" class="tag suggest">-</span>
    </div>
</div>

<script>
/* ✅ 使用 Netlify Functions（稳定方案） */
const NETLIFY_FUNCTION_URL = "/.netlify/functions/fetch?url=";
const G28_URL = encodeURIComponent("https://www.q28.cc/");

function log(msg){
    const l=document.getElementById("log");
    l.innerText+=msg+"\n";
    l.scrollTop=l.scrollHeight;
}

function getMorph(n){
    return n<=13?(n%2===0?"小双":"小单"):(n%2===0?"大双":"大单");
}

async function loadData(){
    log("正在通过 Netlify 接口读取 G28.cc ...");
    try{
        const res = await fetch(NETLIFY_FUNCTION_URL + G28_URL);
        if(!res.ok) throw new Error("接口返回错误");
        const html = await res.text();
        log("✅ 数据读取成功");

        const parser = new DomParser();
        const doc = parser.parseFromString(html,"text/html");
        const rows = doc.querySelectorAll("table tr");

        const data=[];
        for(let i=1;i<=3&&rows[i];i++){
            const cols=rows[i].querySelectorAll("td");
            if(cols.length>=4){
                data.push([
                    +cols[1].innerText,
                    +cols[2].innerText,
                    +cols[3].innerText
                ]);
            }
        }

        if(data.length<3) throw new Error("数据不足");

        calculate(data);

    }catch(e){
        log("❌ 失败："+e.message);
        log("请检查 Netlify 是否正确部署");
    }
}

function calculate(d){
    const [a,b,c]=d;

    // 杀组
    const firstSum=a[0]+b[0]+c[0];
    let adj=0;
    [a,b,c].forEach(x=>{
        adj+=(x[1]+x[2]>10)?1:-1;
    });
    const kill=firstSum+adj;

    // 建议组合
    const c1=a[0]*100+a[1]*10+b[2];
    const c2=b[0]*100+b[1]*10+a[2];
    const c3=c[0]*100+c[1]*10+c[2];
    const total=c1+c2+c3;
    const digitSum=[...String(total)].reduce((x,y)=>+x+(+y),0);

    let suggest=getMorph(digitSum);

    // 自动修正
    let killMorph=getMorph(kill);
    if(killMorph===suggest){
        suggest= killMorph.includes("大")?killMorph.replace("大","小"):killMorph.replace("小","大");
    }

    document.getElementById("kill").innerText=`${kill}（${killMorph}）`;
    document.getElementById("suggest").innerText=suggest;
    document.getElementById("result").style.display="block";

    log("✅ 计算完成");
}
</script>
</body>
</html>
